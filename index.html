document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

px; border:1px solid oklch(90% 0.01 250);\">\n          <div style=\"width:40px; height:40px; border-radius:10px; background:oklch(55% 0.14 250); margin-bottom:16px;\"><\u002Fdiv>\n          <div style=\"font-weight:700; font-size:17px; margin-bottom:10px;\">Vehicle Services<\u002Fdiv>\n          <div style=\"font-size:14.5px; line-height:1.6; color:oklch(42% 0.01 250);\">Manheim looks after your assets every step of the way, maximising the return with a wide range of value-add services.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:white; border-radius:14px; padding:28px; border:1px solid oklch(90% 0.01 250);\">\n          <div style=\"width:40px; height:40px; border-radius:10px; background:oklch(68% 0.19 40); margin-bottom:16px;\"><\u002Fdiv>\n          <div style=\"font-weight:700; font-size:17px; margin-bottom:10px;\">Car Buying<\u002Fdiv>\n          <div style=\"font-size:14.5px; line-height:1.6; color:oklch(42% 0.01 250);\">Sell My Car buys directly from owners, with payment guaranteed and deposited within 24 hours of sale.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <button sc-camel-on-click=\"{{ openRemarketingChat }}\" style=\"margin-top:32px; background:oklch(22% 0.035 255); color:white; border:none; padding:12px 24px; border-radius:8px; font-weight:700; font-size:15px; cursor:pointer;\">Ask AutoMate about remarketing &amp; vehicle services<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"buy-sell\" style=\"padding:88px 48px; max-width:1100px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:center;\">\n    <div>\n      <div style=\"font-size:13px; font-weight:700; color:oklch(45% 0.16 40); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px;\">Sell My Car<\u002Fdiv>\n      <h2 style=\"font-size:30px; font-weight:800; margin:0 0 16px;\">Sell your car in as little as 24 hours<\u002Fh2>\n      <p style=\"font-size:16px; line-height:1.7; color:oklch(38% 0.01 2 02Fdiv>\n      <sc-if value=\"{{ valuationInlayOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute; inset:0; background:white; display:flex; flex-direction:column; z-index:5;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:oklch(22% 0.035 255); color:white;\">\n            <div style=\"font-weight:700; font-size:13.5px;\">sellmycar.com.au — instant valuation<\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:14px;\">\n              <a href=\"https://www.sellmycar.com.au/\" target=\"_blank\" rel=\"noopener\" style=\"color:white; opacity:0.85; font-size:12.5px; text-decoration:none;\">Open in new tab ↗<\u002Fa>\n              <button sc-camel-on-click=\"{{ closeValuationInlay }}\" style=\"background:transparent; border:none; color:white; font-size:18px; cursor:pointer; opacity:0.85; line-height:1;\">×<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <iframe src=\"https://www.sellmycar.com.au/\" title=\"Sell My Car\" style=\"flex:1; border:none; width:100%;\"><\u002Fiframe>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"padding:0 48px 96px; max-width:1100px; margin:0 auto;\">\n    <div style=\"background:oklch(22% 0.035 255); border-radius:18px; padding:44px; color:white; display:grid; grid-template-columns:1fr 1fr; gap:48px; align-items:center;\">\n      <div>\n        <div style=\"font-size:13px; font-weight:700; color:oklch(78% 0.15 45); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px;\">Our Company<\u002Fdiv>\n        <h2 style=\"font-size:26px; font-weight:800; margin:0 0 14px;\">Transforming the way people buy, sell, own and use vehicles<\u002Fh2>\n        <p style=\"font-size:15px; line-height:1.7; opacity:0.85; margin:0;\">As the world's largest automotive services organisation, we hold the broadest, deepest view of the new and used vehicle ecosystem — driving digital transformation across defleet, remarketing, and retail for customers throughout Australia and New Zealand. Cox Automotive is part of Cox Enterprises, a family-owned company built on a culture of giving back.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:12px;\">\n        <button sc-camel-on-click=\"{{ openAboutChat }}\" style=\"background:oklch(68% 0.19 40); color:oklch(20% 0.02 255); border:none; padding:12px 22px; border-radius:8px; font-weight:700; font-size:15px; cursor:pointer; align-self:flex-start;\">Ask AutoMate about our company<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"background:oklch(22% 0.035 255); color:oklch(85% 0.01 250); padding:32px 48px; font-size:13px; display:flex; justify-content:space-between; align-items:center;\">\n    <div>© 2026 Cox Automotive Australia. Part of Cox Enterprises.<\u002Fdiv>\n    <div style=\"display:flex; gap:24px;\">\n      <a href=\"#dealer\" style=\"color:oklch(85% 0.01 250); text-decoration:none;\">Dealer Solutions<\u002Fa>\n      <a href=\"#auctions\" style=\"color:oklch(85% 0.01 250); text-decoration:none;\">Auctions<\u002Fa>\n      <a href=\"#buy-sell\" style=\"color:oklch(85% 0.01 250); text-decoration:none;\">Sell My Car<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <sc-if value=\"{{ chatOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; inset:0; z-index:40;\" sc-camel-on-click=\"{{ closeChat }}\"><\u002Fdiv>\n    <div style=\"position:fixed; bottom:24px; right:24px; height:min(70vh,640px); width:33vw; min-width:320px; max-width:460px; background:white; z-index:41; border-radius:16px; overflow:hidden; box-shadow:0 20px 50px oklch(10% 0.03 255 / 0.35); display:flex; flex-direction:column; animation:slideIn .22s ease-out;\">\n      <div style=\"background:oklch(22% 0.035 255); color:white; padding:20px 22px; display:flex; align-items:center; gap:12px;\">\n        <div style=\"width:38px; height:38px; border-radius:10px; background:oklch(68% 0.19 40); position:relative; overflow:visible; box-shadow:0 0 12px 1px oklch(68% 0.19 200 / 0.55); flex-shrink:0;\">\n          <div style=\"position:absolute; left:5px; top:6px; width:28px; height:24px; border-radius:9px 9px 12px 12px; background:white; overflow:hidden;\">\n            <div style=\"position:absolute; left:5px; top:7px; width:6px; height:6px; border-radius:50%; background:oklch(68% 0.19 200);\"><\u002Fdiv>\n            <div style=\"position:absolute; left:17px; top:7px; width:6px; height:6px; border-radius:50%; background:oklch(68% 0.19 200);\"><\u002Fdiv>\n            <div style=\"position:absolute; left:12px; top:14px; width:4px; height:5px; border-radius:2px; background:oklch(68% 0.19 200);\"><\u002Fdiv>\n            <div style=\"position:absolute; left:4px; bottom:0; width:20px; height:6px; border-radius:0 0 8px 8px; background:oklch(20% 0.02 255); transform-origin:50% 0%; animation:bumperWave 1s ease-in-out;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:absolute; left:-3px; top:11px; width:4px; height:6px; border-radius:2px; background:white;\"><\u002Fdiv>\n          <div style=\"position:absolute; right:-3px; top:11px; width:4px; height:6px; border-radius:2px; background:white;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;\">\n          <div style=\"font-weight:800; font-size:16px;\">AutoMate — Your AI Assistant<\u002Fdiv>\n          <div style=\"font-size:12.5px; opacity:0.75;\">Cox Automotive Australia<\u002Fdiv>\n        <\u002Fdiv>\n        <button sc-camel-on-click=\"{{ closeChat }}\" style=\"background:transparent; border:none; color:white; font-size:20px; cursor:pointer; opacity:0.75; line-height:1;\">×<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; background:oklch(97% 0.004 250);\">\n        <sc-for list=\"{{ messages }}\" as=\"msg\" hint-placeholder-count=\"2\">\n          <div style=\"display:flex; justify-content:{{ msg.align }};\">\n            <div style=\"max-width:80%; padding:12px 15px; border-radius:14px; font-size:14.5px; line-height:1.55; white-space:pre-line; background:{{ msg.bg }}; color:{{ msg.color }};\">{{ msg.text }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ typing }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; justify-content:flex-start;\">\n            <div style=\"padding:12px 16px; border-radius:14px; background:oklch(92% 0.008 250); display:flex; gap:5px; align-items:center;\">\n              <div style=\"width:7px; height:7px; border-radius:50%; background:oklch(55% 0.01 250); animation:typingDot 1.1s infinite;\"><\u002Fdiv>\n              <div style=\"width:7px; height:7px; border-radius:50%; background:oklch(55% 0.01 250); animation:typingDot 1.1s infinite .15s;\"><\u002Fdiv>\n              <div style=\"width:7px; height:7px; border-radius:50%; background:oklch(55% 0.01 250); animation:typingDot 1.1s infinite .3s;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"padding:12px 16px; display:flex; gap:8px; flex-wrap:wrap; border-top:1px solid oklch(92% 0.006 250);\">\n        <sc-for list=\"{{ quickReplies }}\" as=\"q\" hint-placeholder-count=\"3\">\n          <button sc-camel-on-click=\"{{ q.onClick }}\" style=\"background:oklch(96% 0.01 250); border:1px solid oklch(88% 0.012 250); border-radius:999px; padding:7px 13px; font-size:13px; font-weight:600; color:oklch(30% 0.02 250); cursor:pointer;\">{{ q.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"padding:14px 16px; display:flex; gap:10px; border-top:1px solid oklch(92% 0.006 250);\">\n        <input value=\"{{ input }}\" sc-camel-on-change=\"{{ onInputChange }}\" sc-camel-on-key-down=\"{{ onInputKeyDown }}\" placeholder=\"Type your question…\" style=\"flex:1; border:1.5px solid oklch(88% 0.012 250); border-radius:10px; padding:11px 14px; font-size:14px; font-family:inherit; outline:none;\">\n        <button sc-camel-on-click=\"{{ onSendClick }}\" style=\"background:oklch(68% 0.19 40); color:oklch(20% 0.02 255); border:none; border-radius:10px; padding:0 18px; font-weight:800; font-size:14px; cursor:pointer;\">Send<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:1000}}\">\nconst SEGMENTS = {\n  general: { name: null, greeting: \"Hi, I'm AutoMate — your Cox Automotive Australia assistant. Are you looking to buy or sell a vehicle, use our dealer software solutions, or need info on our auction services?\",\n    quick: [[\"Sell my car\",\"sell\"],[\"Dealer software\",\"dealer\"],[\"Auction services\",\"auction\"],[\"Get in touch\",\"contact\"]] },\n  contact: { name: 'Get in Touch', greeting: \"Here are our contact details:\\n\\nHead Office\\nGordon Luck Avenue, Altona North VIC 3025\\n\\nGeneral Enquiries\\ncaa.supportanz@coxautoinc.com\\n\\nRecruitment Enquiries\\ncaa.talentacquisition@coxautoinc.com\\n\\nPress Enquiries\\ncaa.pressenquiries@coxautoinc.com\",\n    quick: [[\"Sell my car\",\"sell\"],[\"Dealer software\",\"dealer\"],[\"Auction services\",\"auction\"]] },\n  sell: { name: 'Sell My Car', greeting: \"Great, let's get your car valued! Tell me the make, model and year, or ask me anything about the process — valuations, buying centres, or payment timing.\",\n    quick: [[\"How does valuation work?\",\"valuation\"],[\"How fast do I get paid?\",\"payment\"],[\"Where are buying centres?\",\"location\"]] },\n  dealer: { name: 'Dealer Solutions', greeting: \"I can help with our dealer software — LeadDriver CRM, inventory, and digital marketing tools. What would you like to know?\",\n    quick: [[\"What is LeadDriver?\",\"leaddriver\"],[\"Digital marketing tools\",\"marketing\"],[\"Book a demo\",\"demo\"]] },\n  auction: { name: 'Auctions', greeting: \"Happy to help with our wholesale auctions and Manheim marketplaces. Ask me about bidding, fees, or upcoming sales.\",\n    quick: [[\"How do I register to bid?\",\"register\"],[\"Are auctions physical or online?\",\"format\"],[\"What fees apply?\",\"fees\"]] },\n  remarketing: { name: 'Remarketing & Vehicle Services', greeting: \"I can help with our Automated Remarketing & Vehicle Services — covering Remarketing, Vehicle Services, and Car Buying through Manheim and Sell My Car. What would you like to know?\",\n    quick: [[\"What is Remarketing?\",\"remarketing\"],[\"What are Vehicle Services?\",\"vehicleservices\"],[\"How does Car Buying work?\",\"carbuying\"]] },\n  about: { name: 'Our Company', greeting: \"Happy to tell you about Cox Automotive Australia — our vision, who we are, our brands, and our locations. What would you like to know?\",\n    quick: [[\"What is Cox Automotive's vision?\",\"vision\"],[\"Who owns Cox Automotive?\",\"parent\"],[\"What brands do you own?\",\"brands\"],[\"Where are your locations?\",\"locations\"]] },\n};\n\nconst REPLIES = {\n  contact: {\n    default: \"Head Office\\nGordon Luck Avenue, Altona North VIC 3025\\n\\nGeneral Enquiries: caa.supportanz@coxautoinc.com\\nRecruitment Enquiries: caa.talentacquisition@coxautoinc.com\\nPress Enquiries: caa.pressenquiries@coxautoinc.com\",\n  },\n  remarketing: {\n    remarketing: \"Remarketing covers passenger cars, commercial vehicles, trucks, motorcycles, boats, and equipment — plus specialist remarketing of damaged vehicles for the insurance industry, backed by over 60 years of Australian experience.\",\n    vehicleservices: \"Manheim's Vehicle Services look after your assets end-to-end, with a range of value-add services designed to maximise the return on every vehicle.\",\n    carbuying: \"Sell My Car buys vehicles directly from owners — fast, guaranteed payment deposited within 24 hours of sale, then on-sold through Manheim's sales channels.\",\n    default: \"Automated Remarketing & Vehicle Services spans three areas: Remarketing (wholesale marketplaces via Manheim), Vehicle Services (asset management), and Car Buying (Sell My Car). Which would you like to know more about?\",\n  },\n  about: {\n    vision: \"Our vision is to transform the way people buy, sell, own and use vehicles — making traditional remarketing and defleeting more efficient while building digital tools that let our customers compete in an increasingly digital world.\",\n    parent: \"Cox Automotive is part of Cox Enterprises, a privately-owned, Atlanta-based company with revenues exceeding $20 billion, operating with a culture of giving back to the communities it serves.\",\n    brands: \"Our featured brands include Sell My Car, Manheim, Cognition, and Kelley Blue Book (KBB) — covering car buying, wholesale remarketing, and industry intelligence.\",\n    locations: \"Manheim operates auction sites across Australia — Melbourne (Gordon Luck Avenue, Altona North, our ANZ head office), Sydney (Moorebank), Brisbane, Brisbane Industrial, Adelaide, Perth, Newcastle, Darwin, Hobart, Townsville, Wagga Wagga, plus Manheim Online for 24/7 digital bidding.\",\n    default: \"Cox Automotive is the world's largest automotive services organisation, with the broadest view of the new and used vehicle ecosystem across Australia and New Zealand. Ask me about our vision, our parent company, our brands, or our locations.\",\n  },\n  sell: {\n    valuation: \"Our online valuation uses current market data plus your car's make, model, year, and condition to give an instant estimate. A free inspection at a buying centre confirms the final offer.\",\n    payment: \"Once you accept an offer, payment is typically deposited into your account within 24 hours of handover.\",\n    location: \"We have buying centres across major Australian metro areas including Melbourne, Sydney, and Brisbane — I can point you to the nearest one if you share your postcode.\",\n    default: \"For selling your car: get an instant online valuation, book a free inspection, and if you accept our offer, funds usually land within 24 hours. Want details on valuation, payment timing, or buying centre locations?\",\n  },\n  dealer: {\n    leaddriver: \"LeadDriver is our dealer CRM — it captures and manages leads from every channel, automates follow-ups, and gives your team a single view of every customer.\",\n    marketing: \"Our digital marketing tools handle inventory advertising, website integration, and performance tracking so your listings reach more buyers automatically.\",\n    demo: \"I can flag your interest for a demo — a Cox Automotive specialist will reach out to schedule a walkthrough of LeadDriver and our dealer platform.\",\n    default: \"Our dealer solutions cover CRM (LeadDriver), inventory management, and digital marketing — all built for Australian dealership workflows. Want to know more about LeadDriver, marketing tools, or booking a demo?\",\n  },\n  auction: {\n    register: \"Registering to bid is free — create a trade account, verify your dealer licence, and you'll get access to both physical and online Manheim sales.\",\n    format: \"We run both physical auction sites and Manheim's digital marketplace, so you can bid in person or online depending on what suits your business.\",\n    fees: \"Buyer and seller fees vary by vehicle and sale channel — I can connect you with a Manheim rep for an exact fee schedule for your account type.\",\n    default: \"Our wholesale auctions connect dealers and trade buyers across Australia through Manheim's physical and digital marketplaces. Ask me about registering to bid, sale formats, or fees.\",\n  },\n};\n\nfunction matchReply(segment, text) {\n  const t = text.toLowerCase();\n  const table = REPLIES[segment] || REPLIES.sell;\n  if (segment === 'sell') {\n    if (/(value|worth|price|estimat)/.test(t)) return table.valuation;\n    if (/(pay|money|fund|deposit|fast)/.test(t)) return table.payment;\n    if (/(where|location|centre|center|near)/.test(t)) return table.location;\n  } else if (segment === 'dealer') {\n    if (/leaddriver|crm|lead/.test(t)) return table.leaddriver;\n    if (/market|advertis|website/.test(t)) return table.marketing;\n    if (/demo|trial|contact|call/.test(t)) return table.demo;\n  } else if (segment === 'auction') {\n    if (/regist|sign up|bid/.test(t)) return table.register;\n    if (/online|physical|format|virtual/.test(t)) return table.format;\n    if (/fee|cost|charge/.test(t)) return table.fees;\n  } else if (segment === 'remarketing') {\n    if (/remarket/.test(t)) return table.remarketing;\n    if (/vehicle service|asset/.test(t)) return table.vehicleservices;\n    if (/car buy|sell my car|payment/.test(t)) return table.carbuying;\n  } else if (segment === 'about') {\n    if (/vision|mission/.test(t)) return table.vision;\n    if (/own|parent|enterprise/.test(t)) return table.parent;\n    if (/brand/.test(t)) return table.brands;\n    if (/location|address|where|office|site/.test(t)) return table.locations;\n  }\n  return table.default;\n}\n\nclass Component extends DCLogic {\n  state = { chatOpen: false, segment: 'general', messages: [], input: '', typing: false, valuationInlayOpen: false };\n\n  botMsg(text) { return { from: 'bot', text, align: 'flex-start', bg: 'oklch(92% 0.008 250)', color: 'oklch(22% 0.02 250)' }; }\n  userMsg(text) { return { from: 'user', text, align: 'flex-end', bg: 'oklch(22% 0.035 255)', color: 'white' }; }\n\n  openChat = (e) => {\n    const seg = (e && e.currentTarget && e.currentTarget.dataset && e.currentTarget.dataset.segment) || 'general';\n    this.startSegment(seg);\n  };\n  openWithSegment(seg) { this.startSegment(seg); }\n  startSegment(seg) {\n    const s = SEGMENTS[seg] || SEGMENTS.general;\n    this.setState({ chatOpen: true, segment: seg, messages: [this.botMsg(s.greeting)], input: '', typing: false });\n  }\n  closeChat = () => this.setState({ chatOpen: false });\n  openValuationInlay = () => this.setState({ valuationInlayOpen: true });\n  closeValuationInlay = () => this.setState({ valuationInlayOpen: false });\n\n  pushUserAndReply(text) {\n    const trimmed = (text || '').trim();\n    if (!trimmed) return;\n    const seg = this.state.segment === 'general' ? 'sell' : (REPLIES[this.state.segment] ? this.state.segment : 'sell');\n    this.setState(s => ({ messages: [...s.messages, this.userMsg(trimmed)], input: '', typing: true }));\n    setTimeout(() => {\n      const reply = matchReply(seg, trimmed);\n      this.setState(s => ({ messages: [...s.messages, this.botMsg(reply)], typing: false }));\n    }, 900);\n  }\n\n  onInputChange = (e) => this.setState({ input: e.target.value });\n  onInputKeyDown = (e) => { if (e.key === 'Enter') this.pushUserAndReply(this.state.input); };\n  onSendClick = () => this.pushUserAndReply(this.state.input);\n\n  renderVals() {\n    const seg = SEGMENTS[this.state.segment] || SEGMENTS.general;\n    const quickReplies = seg.quick.map(([label, key]) => ({ label, onClick: () => this.pushUserAndReply(label) }));\n    const auctionCards = [\n      { color: 'oklch(55% 0.14 250)' }, { color: 'oklch(68% 0.19 40)' }, { color: 'oklch(68% 0.19 200)' }, { color: 'oklch(60% 0.13 190)' },\n    ];\n    const heroCards = [\n      { title: 'Buy or Sell a Vehicle', desc: 'Get an instant valuation and sell your car in as little as 24 hours.', cta: 'Sell my car', color: 'oklch(68% 0.19 40)', onSelect: () => this.startSegment('sell') },\n      { title: 'Dealer Software Solutions', desc: 'CRM, LeadDriver and digital tools built for Australian dealerships.', cta: 'Explore dealer tools', color: 'oklch(55% 0.14 250)', onSelect: () => this.startSegment('dealer') },\n      { title: 'Auctions & Wholesale', desc: 'Manheim wholesale marketplaces for trade buyers and sellers.', cta: 'View auction services', color: 'oklch(60% 0.13 190)', onSelect: () => this.startSegment('auction') },\n    ];\n    return {\n      chatOpen: this.state.chatOpen,\n      messages: this.state.messages,\n      typing: this.state.typing,\n      input: this.state.input,\n      quickReplies,\n      auctionCards,\n      heroCards,\n      openChat: this.openChat,\n      openDealerChat: () => this.startSegment('dealer'),\n      openRemarketingChat: () => this.startSegment('remarketing'),\n      openAboutChat: () => this.startSegment('about'),\n      valuationInlayOpen: this.state.valuationInlayOpen,\n      openValuationInlay: this.openValuationInlay,\n      closeValuationInlay: this.closeValuationInlay,\n      openAuctionChat: () => this.startSegment('auction'),\n      openSellChat: () => this.startSegment('sell'),\n      closeChat: this.closeChat,\n      onInputChange: this.onInputChange,\n      onInputKeyDown: this.onInputKeyDown,\n      onSendClick: this.onSendClick,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
